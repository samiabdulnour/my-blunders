<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none" role="img" aria-label="my blunders">
  <!-- Warm-black tile so the light-mint mark reads at favicon sizes. -->
  <rect width="32" height="32" fill="#16140F" />
  <!-- 4x4 mint checker with one coral accent square (the "blunder"). -->
  <rect x="6" y="6" width="5" height="5" fill="#7CE3A0" />
  <rect x="16" y="6" width="5" height="5" fill="#7CE3A0" />
  <rect x="11" y="11" width="5" height="5" fill="#7CE3A0" />
  <rect x="21" y="11" width="5" height="5" fill="#7CE3A0" />
  <rect x="16" y="11" width="5" height="5" fill="#F44E48" />
  <rect x="6" y="16" width="5" height="5" fill="#7CE3A0" />
  <rect x="16" y="16" width="5" height="5" fill="#7CE3A0" />
  <rect x="11" y="21" width="5" height="5" fill="#7CE3A0" />
  <rect x="21" y="21" width="5" height="5" fill="#7CE3A0" />
</svg>
